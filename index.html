<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/company/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
    />
    <meta
      name="description"
      content="혁신적인 소프트웨어로 비즈니스의 디지털 전환을 이끄는 IT 개발 전문 기업"
    />
    <title>Tilon — IT 개발 전문 기업</title>
    <script>
      // Apply saved theme/accent before first paint to avoid a flash.
      ;(function () {
        try {
          var t = localStorage.getItem('tilon-theme')
          if (t !== 'light' && t !== 'dark') {
            t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          }
          var a = localStorage.getItem('tilon-accent') || 'blue'
          var el = document.documentElement
          el.setAttribute('data-theme', t)
          el.setAttribute('data-accent', a)
        } catch (e) {}
      })()
    </script>
    <script>
      // Restore the deep-link path saved by 404.html (GitHub Pages SPA fallback).
      ;(function () {
        var redirect = sessionStorage.redirect
        delete sessionStorage.redirect
        if (redirect && redirect !== location.href) {
          history.replaceState(null, '', redirect)
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
